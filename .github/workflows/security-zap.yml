name: Security - CodeQL SAST and OWASP ZAP API Scan

on:
  pull_request:
    paths:
      - 'src/**'
      - 'supabase/schema/**'
      - 'tests/security/**'
      - 'Dockerfile'
      - 'docker-compose.security.yml'
      - 'package*.json'
      - '.github/workflows/security-zap.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'supabase/schema/**'
      - 'tests/security/**'
      - 'Dockerfile'
      - 'docker-compose.security.yml'
      - 'package*.json'
      - '.github/workflows/security-zap.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql-sast:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  zap-api-scan:
    needs: codeql-sast
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ZAP_GENERATE_TEST_TOKEN: 'true'
      ZAP_FAIL_ON_WARNINGS: 'false'
      ZAP_MAX_WAIT_MINUTES: '5'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare ZAP writable directories
        run: |
          mkdir -p tests/security/.zap tests/security/reports
          chmod -R 777 tests/security/.zap tests/security/reports

      - name: Run OWASP ZAP API scan
        run: |
          docker compose -f docker-compose.security.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from zap-api-scan \
            zap-api-scan

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-api-reports
          path: tests/security/reports/
          if-no-files-found: warn

      - name: Stop security stack
        if: always()
        run: docker compose -f docker-compose.security.yml down -v --remove-orphans
